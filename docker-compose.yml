# Dois perfis: "dev" (Vite com HMR) e "prod" (build estático via nginx).
# Uso:
#   docker compose --profile dev up      -> http://localhost:5173
#   docker compose --profile prod up --build  -> http://localhost:8088
services:
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Monta o código para hot-reload; preserva node_modules do container.
      - .:/app
      - /app/node_modules
    environment:
      # Necessário para o HMR do Vite funcionar dentro de containers em alguns hosts.
      - CHOKIDAR_USEPOLLING=true

  prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:80"
